name: inventory-management-ai-mcp
description: 'Stock control toolkit: reorder points, demand forecasting, SKU optimization,
  warehouse layout, and s'
version: 1.0.0
tools:
- name: reorder_point
  description: Calculate optimal reorder point, safety stock, and economic order quantity
  parameters:
  - name: avg_daily_demand
    type: number
    required: true
  - name: lead_time_days
    type: integer
    required: false
  - name: safety_stock_days
    type: integer
    required: false
  - name: service_level
    type: number
    required: false
  - name: demand_std_dev
    type: number
    required: false
- name: demand_forecast
  description: Forecast future demand from historical sales data with confidence intervals.
  parameters:
  - name: historical_data
    type: number
    required: true
  - name: periods_ahead
    type: integer
    required: false
  - name: method
    type: string
    required: false
  - name: seasonality_period
    type: integer
    required: false
- name: sku_optimizer
  description: Classify SKUs using ABC/XYZ analysis and recommend inventory strategies.
  parameters:
  - name: skus
    type: array
    required: true
- name: warehouse_layout
  description: Plan warehouse zone layout optimized for picking efficiency.
  parameters:
  - name: zones
    type: array
    required: true
  - name: total_sqft
    type: number
    required: false
  - name: picking_method
    type: string
    required: false
- name: shrinkage_detector
  description: Detect inventory shrinkage by comparing expected vs actual quantities.
  parameters:
  - name: inventory_records
    type: array
    required: true
